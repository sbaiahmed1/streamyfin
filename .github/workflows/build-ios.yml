name: 🤖 iOS IPA Build (Phone + TV)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    branches: [develop, master]
    paths-ignore:
      - "*.md"
  push:
    branches: [develop, master]
    paths-ignore:
      - "*.md"

jobs:
  build-ios:
    if: (!contains(github.event.head_commit.message, '[skip ci]') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == 'streamyfin/streamyfin'))
    runs-on: macos-15
    name: 🏗️ Build iOS IPA
    permissions:
      contents: read
      repository-projects: write

    strategy:
      fail-fast: false
      matrix:
        target: [phone]
    #        target: [phone, tv]

    steps:
      - name: 📢 Notify artifact comment workflow (started)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'build-started',
              client_payload: {
                workflow_name: 'iOS IPA Build',
                target: '${{ matrix.target }}',
                status: 'in_progress',
                pr_number: ${{ github.event.pull_request.number }},
                commit_sha: '${{ github.event.pull_request.head.sha }}',
                run_id: ${{ github.run_id }},
                run_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
              }
            });

      - name: 📥 Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          submodules: recursive
          show-progress: false

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: latest

      - name: 💾 Cache Bun dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-cache-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-cache

      - name: 📦 Install dependencies and reload submodules
        run: |
          bun install --frozen-lockfile
          bun run submodule-reload

      - name: 🛠️ Generate project files
        run: |
          if [ "${{ matrix.target }}" = "tv" ]; then
            bun run prebuild:tv
          else
            bun run prebuild
          fi

      - name: 🏗️ Setup EAS
        uses: expo/expo-github-action@main
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          eas-cache: true

      - name: ⚙️ Ensure iOS/tvOS SDKs installed
        run: |
          if [ "${{ matrix.target }}" = "tv" ]; then
            xcodebuild -downloadPlatform tvOS
          else
            xcodebuild -downloadPlatform iOS
          fi

      - name: 🚀 Build iOS app
        env:
          EXPO_TV: ${{ matrix.target == 'tv' && 1 || 0 }}
        run: eas build -p ios --local --non-interactive

      - name: 📅 Set date tag
        run: echo "DATE_TAG=$(date +%d-%m-%Y_%H-%M-%S)" >> $GITHUB_ENV

      - name: 📤 Upload IPA artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: streamyfin-ios-${{ matrix.target }}-ipa-${{ env.DATE_TAG }}
          path: build-*.ipa
          retention-days: 7

      - name: 🔔 Notify artifact comment workflow (success)
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'build-completed',
              client_payload: {
                workflow_name: 'iOS IPA Build',
                target: '${{ matrix.target }}',
                status: 'success',
                pr_number: ${{ github.event.pull_request.number }},
                commit_sha: '${{ github.event.pull_request.head.sha }}',
                run_id: ${{ github.run_id }},
                run_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
              }
            });

      - name: 🔔 Notify artifact comment workflow (failure)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'build-failed',
              client_payload: {
                workflow_name: 'iOS IPA Build',
                target: '${{ matrix.target }}',
                status: 'failure',
                pr_number: ${{ github.event.pull_request.number }},
                commit_sha: '${{ github.event.pull_request.head.sha }}',
                run_id: ${{ github.run_id }},
                run_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
              }
            });
